<!DOCTYPE html>

<html>
<head>
    <title>Forgot Password</title>


<style>
    body{
        background:#0f172a;
        color:white;
        font-family:Arial,sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box{
        background:#1e293b;
        padding:30px;
        border-radius:15px;
        width:350px;
        text-align:center;
        box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    input{
        width:90%;
        padding:12px;
        margin:10px 0;
        border:none;
        border-radius:8px;
    }

    button{
        width:100%;
        padding:12px;
        background:#38bdf8;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#0ea5e9;
    }
</style>


</head>

<body>

<div class="box">

<h2>🔑 Forgot Password</h2>

<form method="POST">

    <input type="email"
           name="email"
           placeholder="Enter your Email"
           required>

    <input type="password"
           name="password"
           placeholder="Enter New Password"
           required>

    <button type="submit">
        Update Password
    </button>

</form>


</div>

</body>
</html>
