<!DOCTYPE html>
<html>
<head>
    <title>Problem Detail</title>

    <style>
        body{
            background:#0b1120;
            color:white;
            font-family:'Segoe UI',sans-serif;
            margin:0;
            padding:30px;
        }

        .container{
            max-width:1000px;
            margin:auto;
            background:#111827;
            padding:25px;
            border-radius:15px;
        }

        h1{
            color:#38bdf8;
        }

        .desc{
            margin-top:15px;
            color:#cbd5e1;
            line-height:1.6;
        }

        textarea{
            width:100%;
            height:300px;
            margin-top:20px;
            background:#0f172a;
            color:white;
            border:none;
            padding:15px;
            border-radius:10px;
            font-family:monospace;
        }

        button{
            margin-top:15px;
            padding:12px 20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>{{ problem[1] }}</h1>

    <p><b>Difficulty:</b> {{ problem[2] }}</p>
<div class="desc">
    {{ problem[3] }}
</div>

<h3 style="margin-top:20px;">Write Your Code 👇</h3>

<form method="POST" action="/run_code/{{ problem[0] }}">

    <textarea name="code" placeholder="Write your Python code here...">{{ code if code else "" }}</textarea>

    <br>

    <div style="margin-top:15px;display:flex;gap:15px;">

    <button type="submit">▶ Run Code</button>

    <button
        type="submit"
        formaction="/submit_code/{{ problem[0] }}"
        style="background:#16a34a;">
        ✅ Submit
    </button>

</div>

   {% if output %}

<div style="
margin-top:25px;
background:#020617;
border:1px solid #334155;
border-radius:12px;
padding:20px;
">

<h3 style="color:#22c55e;">🖥 Output</h3>

<pre style="
color:#f8fafc;
font-size:16px;
white-space:pre-wrap;
word-wrap:break-word;
">{{ output }}</pre>

</div>

{% endif %}

</form>
    

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>

<script>
    const textarea = document.querySelector("textarea[name='code']");

    const editorDiv = document.createElement("div");
    editorDiv.id = "editor";
    editorDiv.style.height = "450px";
    editorDiv.style.width = "100%";
    editorDiv.style.borderRadius = "12px";

    textarea.parentNode.insertBefore(editorDiv, textarea);

    const editor = ace.edit("editor");

    editor.setTheme("ace/theme/monokai");

    editor.session.setMode("ace/mode/python");

    editor.setValue(textarea.value || "", -1);

    textarea.style.display = "none";

    document.querySelector("form").addEventListener("submit", function () {
        textarea.value = editor.getValue();
    });
</script>
{% if request.args.get("submitted") %}

<script>
alert("🎉 Problem Submitted Successfully!\nStatus changed to Solved.");
</script>

{% endif %}

</body>
</html>
