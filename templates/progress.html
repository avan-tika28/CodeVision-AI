<!DOCTYPE html>

<html>
<head>
    <title>Progress Tracker</title>

```
<style>
    body{
        background:#0f172a;
        color:white;
        font-family:Arial,sans-serif;
        text-align:center;
        margin:0;
    }

    h1{
        color:#38bdf8;
        margin-top:30px;
    }

    .card{
        background:#1e293b;
        width:600px;
        margin:30px auto;
        padding:30px;
        border-radius:20px;
        box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }

    .progress-box{
        width:100%;
        background:#374151;
        border-radius:30px;
        overflow:hidden;
        height:30px;
        margin-top:20px;
    }

    .progress-bar{
        height:30px;
        background:#22c55e;
        width:{{ progress }}%;
        text-align:center;
        line-height:30px;
        font-weight:bold;
        transition:1s;
    }

    .info{
        display:flex;
        justify-content:space-around;
        margin-top:30px;
    }

    .small-card{
        background:#334155;
        padding:20px;
        border-radius:15px;
        width:150px;
    }

    a{
        display:inline-block;
        margin-top:30px;
        padding:12px 20px;
        background:#3b82f6;
        color:white;
        text-decoration:none;
        border-radius:10px;
    }
</style>
```

</head>

<body>

<h1>📈 Progress Tracker</h1>

<div class="card">

<h2>{{ progress }}% Completed</h2>

<div class="progress-box">
    <div class="progress-bar">
        {{ progress }}%
    </div>
</div>

<div class="info">

<div class="small-card">
<h3>💻 Total</h3>
<h2>{{ total }}</h2>
</div>

<div class="small-card">
<h3>✅ Solved</h3>
<h2>{{ solved }}</h2>
</div>

<div class="small-card">
<h3>❌ Remaining</h3>
<h2>{{ remaining }}</h2>
</div>

</div>

<a href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
