<!DOCTYPE html>

<html>
<head>
    <title>Register - CodeVision AI</title>

```
<style>

    body{
        background: linear-gradient(135deg,#0f172a,#1e293b);
        font-family: Arial, sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:#1e293b;
        padding:40px;
        border-radius:20px;
        width:350px;
        text-align:center;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
        color:white;
    }

    input{
        width:90%;
        padding:12px;
        margin:10px 0;
        border:none;
        border-radius:10px;
    }

    button{
        width:100%;
        padding:12px;
        background:#10b981;
        color:white;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#059669;
    }

    p{
        color:#cbd5e1;
    }

    a{
        color:#60a5fa;
        text-decoration:none;
    }

</style>
```

</head>

<body>

```
<div class="container">

    <h1>🚀 CodeVision AI</h1>

    <p>Create Your Account</p>

    <form method="POST">

        <input type="text"
               name="name"
               placeholder="Enter Name"
               required>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/login">
        Already have an account? Login
    </a>

</div>
```

</body>
</html>
