<!DOCTYPE html>

<html>
<head>
    <title>Login</title>


<style>
    body{
        margin:0;
        padding:0;
        background:#0f172a;
        font-family:Arial,sans-serif;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        color:white;
    }

    .container{
        background:#1e293b;
        padding:40px;
        border-radius:20px;
        width:350px;
        text-align:center;
        box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    h1{
        color:#38bdf8;
    }

    p{
        color:#cbd5e1;
    }

    input{
        width:90%;
        padding:12px;
        margin:10px 0;
        border:none;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        background:#38bdf8;
        color:white;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#0284c7;
    }

    .forgot{
        color:#38bdf8;
        text-decoration:none;
        font-weight:bold;
    }

    .forgot:hover{
        text-decoration:underline;
    }
</style>


</head>

<body>

<div class="container">


<h1>🚀 CodeVision AI</h1>

<p>Login to continue</p>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

    <br>

    <a href="/forgot_password" class="forgot">
        Forgot Password?
    </a>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>


</div>

</body>
</html>
