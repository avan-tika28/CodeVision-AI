<!DOCTYPE html>
<html>
<head>
    <title>CodeVision AI</title>

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            font-family:Arial,sans-serif;
            text-align:center;
            margin:0;
            padding:0;
        }

        .hero{
            margin-top:100px;
        }

        h1{
            font-size:60px;
        }

        p{
            font-size:20px;
            color:#cbd5e1;
        }

        .btn{
            display:inline-block;
            margin:15px;
            padding:15px 30px;
            text-decoration:none;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            color:white;
        }

        .login{
            background:#3b82f6;
        }

        .register{
            background:#10b981;
        }

        .features{
            margin-top:80px;
        }

        .card{
            background:#1e293b;
            width:300px;
            margin:20px auto;
            padding:20px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>🚀 CodeVision AI</h1>

    <p>
        Practice Coding Problems, Track Progress,
        and Improve Your Programming Skills.
    </p>

    <a href="/login" class="btn login">Login</a>

    <a href="/register" class="btn register">Register</a>
</div>

<div class="features">

    <h2>✨ Features</h2>

    <div class="card">
        <h3>💻 Coding Problems</h3>
        <p>Solve coding challenges easily.</p>
    </div>

    <div class="card">
        <h3>📈 Progress Tracker</h3>
        <p>Track your learning journey.</p>
    </div>

    <div class="card">
        <h3>🏆 Leaderboard</h3>
        <p>Compete and improve rankings.</p>
    </div>

</div>

</body>
</html>
